<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">ICML badge</title>
  <desc id="desc">Badge for International Conference on Machine Learning</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6c95b"/>
      <stop offset="100%" stop-color="#f08c2e"/>
    </linearGradient>
  </defs>
  <circle cx="48" cy="48" r="44" fill="url(#bg)"/>
  <circle cx="48" cy="48" r="40" fill="#fff7ea" opacity="0.78"/>
  <text x="48" y="43" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#8b3d00">ICML</text>
  <text x="48" y="61" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="6.5" font-weight="700" letter-spacing="0.7" fill="#8b3d00">CONFERENCE</text>
</svg>
